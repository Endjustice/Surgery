name: Model Surgery (Phi-4-Mini Fine-Tuning)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  brain-surgery:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git cmake libcurl4-openssl-dev

    - name: Clone and Build llama.cpp
      run: |
        git clone https://github.com/ggerganov/llama.cpp.git
        cd llama.cpp
        cmake -B build -DGGML_CURL=ON
        cmake --build build --config Release --target llama-finetune --target llama-quantize --target llama-cli
        cp build/bin/llama-finetune ../
        cp build/bin/llama-quantize ../
        cp build/bin/llama-cli ../
        cd ..

    - name: Prepare Surgical Instruments (Download Base Model & Dataset)
      run: |
        curl -L -o base_model.gguf "https://huggingface.co/mradermacher/Phi-4-Mini-Abliterated-i1-GGUF/resolve/main/Phi-4-Mini-Abliterated.i1-Q6_K.gguf"
        echo "بررسی وجود دیتاست..."
        ls -l psychology_fa.txt || (echo "خطا: فایل psychology_fa.txt یافت نشد!" && exit 1)

    - name: Operation Stage 1 - Fine-Tuning (تزریق مستقیم منطق فارسی)
      run: |
        # بر اساس هلپ ارسالی شما:
        # -m مدل پایه را باز می‌کند
        # -f فایل دیتاست کوچه بازاری را تحویل می‌گیرد
        # -t از تمام هسته‌های پردازنده گیت‌هاب استفاده می‌کند
        # --learning-rate نرخ یادگیری بهینه شده
        # --epochs تعداد دورهای جراحی
        ./llama-finetune \
          -m base_model.gguf \
          -f psychology_fa.txt \
          -c 4096 \
          -t $(nproc) \
          --learning-rate 0.0001 \
          --epochs 3

    - name: Operation Stage 2 - Quantization (فشرده‌سازی و فیکس کردن مدل جراحی شده)
      run: |
        # چون فرآیند بالا مستقیماً وزن‌های خود base_model.gguf را تغییر می‌دهد،
        # حالا همین فایل تغییر یافته را دوباره برای خروجی نهایی فشرده می‌کنیم.
        ./llama-quantize base_model.gguf Phi-4-Mini-Persian-619.gguf Q6_K

    - name: Save Patient (Upload the New Fine-Tuned Model)
      uses: actions/upload-artifact@v4
      with:
        name: Persian-Psychology-Phi-4-Model
        path: Phi-4-Mini-Persian-619.gguf
        compression-level: 0
        
