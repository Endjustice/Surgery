name: Model Surgery (Phi-4-Mini Fine-Tuning)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  brain-surgery:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git cmake libcurl4-openssl-dev

    - name: Clone llama.cpp.tinyllm (with llama-finetune)
      run: |
        git clone https://github.com/wdndev/llama.cpp.tinyllm.git
        cd llama.cpp.tinyllm
        cmake -B build
        cmake --build build --config Release --target llama-finetune --target llama-quantize
        cp build/bin/llama-finetune ../llama-finetune
        cp build/bin/llama-quantize ../llama-quantize
        cd ..

    - name: Prepare Surgical Instruments (Download Base Model & Dataset)
      run: |
        curl -L -o base_model.gguf "https://huggingface.co/mradermacher/Phi-4-Mini-Abliterated-i1-GGUF/resolve/main/Phi-4-Mini-Abliterated.i1-Q6_K.gguf"
        echo "بررسی وجود دیتاست..."
        ls -l psychology_fa.txt || (echo "خطا: فایل psychology_fa.txt یافت نشد!" && exit 1)

    - name: Operation Stage 1 - Fine-Tuning (تزریق منطق فارسی)
      run: |
        ./llama-finetune \
          --model-base base_model.gguf \
          --train-data psychology_fa.txt \
          --lora-out lora-psychology-fa.bin \
          --threads $(nproc) \
          --adam-iter 30 \
          --batch 4 \
          --ctx 4096 \
          --epochs 3

    - name: Operation Stage 2 - Quantization & Stitching
      run: |
        ./llama-quantize \
          --lora lora-psychology-fa.bin \
          base_model.gguf \
          Phi-4-Mini-Persian-619.gguf \
          Q6_K

    - name: Save Patient (Upload the New Fine-Tuned Model)
      uses: actions/upload-artifact@v4
      with:
        name: Persian-Psychology-Phi-4-Model
        path: Phi-4-Mini-Persian-619.gguf
        compression-level: 0
