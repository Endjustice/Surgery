name: Model Surgery (Phi-4-Mini Fine-Tuning)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  brain-surgery:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git cmake libcurl4-openssl-dev

    - name: Clone and Build Stable llama.cpp
      run: |
        # بازگشت به نسخه طلایی و ۱۰۰٪ پایدار لاما که ابزار تمرین بهینه دارد
        git clone https://github.com/ggerganov/llama.cpp.git
        cd llama.cpp
        git checkout b2700
        cmake -B build -DGGML_CURL=ON
        cmake --build build --config Release --target finetune --target quantize
        cp build/bin/finetune ../llama-finetune
        cp build/bin/quantize ../llama-quantize
        cd ..

    - name: Prepare Surgical Instruments (Download Base Model & Dataset)
      run: |
        curl -L -o base_model.gguf "https://huggingface.co/mradermacher/Phi-4-Mini-Abliterated-i1-GGUF/resolve/main/Phi-4-Mini-Abliterated.i1-Q6_K.gguf"
        echo "بررسی وجود دیتاست..."
        ls -l psychology_fa.txt || (echo "خطا: فایل psychology_fa.txt یافت نشد!" && exit 1)

    - name: Operation Stage 1 - Fine-Tuning (تزریق منطق فارسی بدون باگ رم)
      run: |
        # استفاده از ابزار کلاسیک لاما که با مدیریت رم عالی روی گیت‌هاب کرش نمی‌کند
        ./llama-finetune \
          --model-base base_model.gguf \
          --train-data psychology_fa.txt \
          --lora-out lora-adapter.bin \
          -c 4096 \
          -t $(nproc) \
          --learning-rate 0.0001 \
          --epochs 3

    - name: Operation Stage 2 - Stitching & Quantization (ادغام آداپتور و فشرده‌سازی)
      run: |
        # در این نسخه کوانتایزر قدیمی می‌تواند مستقیماً آداپتور لورا را درون مدل پایه ادغام (Merge) کند
        ./llama-quantize --lora lora-adapter.bin base_model.gguf Phi-4-Mini-Persian-619.gguf Q6_K

    - name: Save Patient (Upload the New Fine-Tuned Model)
      uses: actions/upload-artifact@v4
      with:
        name: Persian-Psychology-Phi-4-Model
        path: Phi-4-Mini-Persian-619.gguf
        compression-level: 0
        
